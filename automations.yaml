###############################################################################
# EV CHARGING — AUTOMATIONS
###############################################################################
automation:
  # ===========================================================================
  # A) CAR CONNECTED → plan + notify
  # ===========================================================================
  - id: ev_car_connected
    alias: "EV · Car Connected"
    mode: parallel
    max: 2
    trigger:
      - platform: state
        entity_id: sensor.vpg1_2107009785a_1
        from: "Available"
        to: ["Charging","SuspendedEV","SuspendedEVSE"]
        id: "o1"
      - platform: state
        entity_id: sensor.vpg1_2107009785a_2
        from: "Available"
        to: ["Charging","SuspendedEV","SuspendedEVSE"]
        id: "o2"
    condition:
      - condition: state
        entity_id: input_boolean.ev_system_enabled
        state: "on"
    action:
      - variables:
          outlet: "{{ 1 if trigger.id == 'o1' else 2 }}"
          car: "{{ states('input_select.ev_outlet_' ~ outlet ~ '_car') }}"
          is_pri: "{{ states('sensor.ev_today_priority_car') == car }}"
          needs: "{{ states('sensor.ev_priority_car_needs_charging') == 'True' }}"
          weekday: "{{ now().weekday() < 5 }}"
          ssn_kwh: "{{ states('sensor.ev_ssn96m_kwh_needed') }}"
          ev6_kwh: "{{ states('sensor.ev_ev6_kwh_needed') }}"
          est_cost: "{{ state_attr('sensor.ev_cheapest_charge_slots','estimated_cost') | float(0) }}"
          slots_txt: "{{ states('sensor.ev_cheapest_charge_slots') }}"
          plan: >
            {% if is_pri and needs and weekday %}
            📋 SCHEDULED MIN CHARGE
            Target: {{ states('input_number.ev_min_weekday_range_km')|int }}km by {{ states('input_number.ev_weekday_ready_by_hour')|int }}:00
            Need: {{ states('sensor.ev_priority_car_kwh_needed') }}kWh · {{ states('sensor.ev_priority_car_hours_to_target') }}h
            Slots: {{ slots_txt }}
            Est. cost: {{ est_cost }} SEK
            Auto-priority: {{ car }} ({{ ssn_kwh }}kWh SSN96M vs {{ ev6_kwh }}kWh EV6)
            {% elif is_pri and not needs %}
            ✅ RANGE OK · switching to PV surplus
            Already {{ states('sensor.ev_priority_car_range') }}km
            {% else %}
            ☀️ PV SURPLUS
            Available: {{ states('sensor.ev_pv_surplus_available') }}W · {{ states('sensor.ev_pv_surplus_amps') }}A
            {% endif %}
          mode: >
            {% if is_pri and needs and weekday %}Scheduled Minimum
            {% else %}PV Surplus{% endif %}
      - action: input_select.select_option
        target:
          entity_id: "input_select.ev_outlet_{{ outlet }}_charge_mode"
        data:
          option: "{{ mode }}"
      - action: script.ev_notify_car_connected
        data:
          car_name: "{{ car }}"
          outlet: "{{ outlet }}"
          plan: "{{ plan }}"

  # ===========================================================================
  # B) CAR DISCONNECTED → reset
  # ===========================================================================
  - id: ev_car_disconnected
    alias: "EV · Car Disconnected"
    mode: parallel
    max: 2
    trigger:
      - platform: state
        entity_id: sensor.vpg1_2107009785a_1
        to: "Available"
        id: "o1"
      - platform: state
        entity_id: sensor.vpg1_2107009785a_2
        to: "Available"
        id: "o2"
    action:
      - variables:
          outlet: "{{ 1 if trigger.id == 'o1' else 2 }}"
      - action: input_select.select_option
        target:
          entity_id: "input_select.ev_outlet_{{ outlet }}_charge_mode"
        data:
          option: "Off"

  # ===========================================================================
  # C) NOTIFICATION ACTIONS
  # ===========================================================================
  - id: ev_action_charge_now
    alias: "EV · Action: Charge Now"
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data: { action: "EV_CHARGE_NOW_1" }
        id: "o1"
      - platform: event
        event_type: mobile_app_notification_action
        event_data: { action: "EV_CHARGE_NOW_2" }
        id: "o2"
    action:
      - variables:
          outlet: "{{ 1 if trigger.id == 'o1' else 2 }}"
      - action: input_select.select_option
        target:
          entity_id: "input_select.ev_outlet_{{ outlet }}_charge_mode"
        data:
          option: "Charge Now"
      - action: notify.all_devices
        data:
          title: "⚡ Charging NOW · Outlet {{ outlet }}"
          message: "16A / ~11 kW — reconciler will enforce"

  - id: ev_action_charge_full
    alias: "EV · Action: Charge Full"
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data: { action: "EV_CHARGE_FULL_1" }
        id: "o1"
      - platform: event
        event_type: mobile_app_notification_action
        event_data: { action: "EV_CHARGE_FULL_2" }
        id: "o2"
    action:
      - variables:
          outlet: "{{ 1 if trigger.id == 'o1' else 2 }}"
      - action: input_select.select_option
        target:
          entity_id: "input_select.ev_outlet_{{ outlet }}_charge_mode"
        data:
          option: "Charge Full By Tomorrow"
      - action: notify.all_devices
        data:
          title: "🔋 Full charge · Outlet {{ outlet }}"
          message: "Charging to 100% — reconciler will enforce"

  - id: ev_action_stop
    alias: "EV · Action: Stop"
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data: { action: "EV_STOP_1" }
        id: "o1"
      - platform: event
        event_type: mobile_app_notification_action
        event_data: { action: "EV_STOP_2" }
        id: "o2"
    action:
      - variables:
          outlet: "{{ 1 if trigger.id == 'o1' else 2 }}"
      - action: input_select.select_option
        target:
          entity_id: "input_select.ev_outlet_{{ outlet }}_charge_mode"
        data:
          option: "Off"

  # ===========================================================================
  # D) STATE RECONCILER
  #
  # The core of the desired-state architecture. Compares the target amps
  # (from ev_outlet_X_target_amps template sensors) against actual charger
  # state, and enforces the target:
  #   - Every minute (catches PV surplus changes, schedule boundaries)
  #   - Immediately when target changes (mode change, car connect/disconnect)
  #
  # Replaces the old per-mode controllers (PV surplus, scheduled minimum,
  # charge now handler, off handler).
  # ===========================================================================
  - id: ev_state_reconciler
    alias: "EV · State Reconciler"
    mode: restart
    trigger:
      # Periodic enforcement
      - platform: time_pattern
        minutes: "*"
      # Immediate reaction when target changes
      - platform: state
        entity_id:
          - sensor.ev_outlet_1_target_amps
          - sensor.ev_outlet_2_target_amps
    condition:
      - condition: state
        entity_id: input_boolean.ev_system_enabled
        state: "on"
      - condition: state
        entity_id: binary_sensor.ev_system_sensors_healthy
        state: "on"
    action:
      - repeat:
          # Each item: outlet number (matches entity names) + connector ID (0-based for ChargeAmps API)
          for_each:
            - { outlet: "1" }
            - { outlet: "2" }
          sequence:
            - variables:
                outlet: "{{ repeat.item.outlet }}"
                connector: "{{ repeat.item.connector }}"
                target: "{{ states('sensor.ev_outlet_' ~ outlet ~ '_target_amps') | int(0) }}"
                is_charging: "{{ states('sensor.vpg1_2107009785a_' ~ outlet) == 'Charging' }}"
                connected: "{{ is_state('binary_sensor.ev_outlet_' ~ outlet ~ '_car_connected', 'on') }}"
                cp_id: "{{ state_attr('sensor.vpg1_2107009785a_' ~ outlet, 'charge_point_id') }}"
                connector_id: "{{ state_attr('sensor.vpg1_2107009785a_' ~ outlet, 'connector_id') }}"
            - choose:
                # Should be charging → set current + ensure switch is on
                - conditions: "{{ target > 0 and connected and cp_id not in ['','None','unknown','unavailable',None] }}"
                  sequence:
                    - action: chargeamps.set_max_current
                      data:
                        chargepoint: "{{ cp_id }}"
                        connector: "{{ connector_id }}"
                        max_current: "{{ [[target, 6] | max, 16] | min }}"
                    - condition: template
                      value_template: "{{ not is_charging }}"
                    - delay: { seconds: 2 }
                    - action: switch.turn_on
                      target:
                        entity_id: "switch.vpg1_2107009785a_{{ outlet }}"
                # Should NOT be charging → stop
                - conditions: "{{ target == 0 and is_charging and connected }}"
                  sequence:
                    - action: script.ev_stop_charging
                      data:
                        outlet: "{{ outlet }}"

  # ===========================================================================
  # E) SCHEDULED MINIMUM → TARGET REACHED
  #
  # When priority car no longer needs charging, switch its outlet from
  # "Scheduled Minimum" to "PV Surplus" and notify.
  # (The reconciler handles the actual stop — this just manages the mode.)
  # ===========================================================================
  - id: ev_scheduled_target_reached
    alias: "EV · Scheduled Target Reached → PV"
    trigger:
      - platform: state
        entity_id: sensor.ev_priority_car_needs_charging
        to: "False"
    condition:
      - condition: state
        entity_id: input_boolean.ev_system_enabled
        state: "on"
    action:
      - variables:
          pri_out: "{{ states('sensor.ev_priority_car_outlet') }}"
      - condition: template
        value_template: >
          {{ pri_out in ['1','2']
             and states('input_select.ev_outlet_' ~ pri_out ~ '_charge_mode')
                == 'Scheduled Minimum' }}
      - action: input_select.select_option
        target:
          entity_id: "input_select.ev_outlet_{{ pri_out }}_charge_mode"
        data:
          option: "PV Surplus"
      - action: notify.all_devices
        data:
          title: "✅ {{ states('sensor.ev_today_priority_car') }} target reached"
          message: >
            {{ states('sensor.ev_priority_car_range') }}km · Switched to PV surplus.

  # ===========================================================================
  # F) SAFETY CHARGE NOTIFICATION
  #
  # The reconciler handles the actual charging (target_amps = 16 when past
  # deadline). This automation just sends the one-time notification.
  # ===========================================================================
  - id: ev_safety_charge_notify
    alias: "EV · Safety Charge Notification"
    trigger:
      - platform: state
        entity_id: sensor.ev_priority_past_safety_deadline
        to: "True"
    condition:
      - condition: state
        entity_id: input_boolean.ev_system_enabled
        state: "on"
      - condition: template
        value_template: >
          {{ states('sensor.ev_priority_car_needs_charging') == 'True' }}
    action:
      - variables:
          ready_by: "{{ states('input_number.ev_weekday_ready_by_hour') | int(7) }}"
      - action: notify.all_devices
        data:
          title: "⚠️ Safety charge activated"
          message: >
            {{ states('sensor.ev_today_priority_car') }} still needs
            {{ states('sensor.ev_priority_car_kwh_needed') }}kWh.
            Charging now to ensure {{ states('input_number.ev_min_weekday_range_km')|int }}km by {{ ready_by }}:00.

  # ===========================================================================
  # G) WEEKEND FULL CHARGE
  # ===========================================================================
  - id: ev_weekend_full_charge_on
    alias: "EV · Weekend Full Charge ON"
    trigger:
      - platform: state
        entity_id: input_boolean.ev_weekend_full_charge
        to: "on"
    action:
      - repeat:
          for_each: ["1", "2"]
          sequence:
            - action: input_select.select_option
              target:
                entity_id: "input_select.ev_outlet_{{ repeat.item }}_charge_mode"
              data:
                option: "Charge Now"
      - action: notify.all_devices
        data:
          title: "🔋 Weekend Full Charge ON"
          message: >
            SSN96M: {{ states('sensor.ev_ssn96m_range') }}km · {{ states('sensor.ev_ssn96m_soc') }}%
            EV6: {{ states('sensor.ev_ev6_range') }}km · {{ states('sensor.ev_ev6_soc') }}%

  - id: ev_weekend_full_charge_reset
    alias: "EV · Weekend Full Charge Reset"
    trigger:
      - platform: time
        at: "00:05:00"
    condition:
      - condition: time
        weekday: [mon]
    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ev_weekend_full_charge
      - repeat:
          for_each: ["1", "2"]
          sequence:
            - condition: template
              value_template: >
                {{ is_state('binary_sensor.ev_outlet_' ~ repeat.item ~ '_car_connected','on') }}
            - action: input_select.select_option
              target:
                entity_id: "input_select.ev_outlet_{{ repeat.item }}_charge_mode"
              data:
                option: "PV Surplus"

  # ===========================================================================
  # H) SENSOR HEALTH WATCHDOG
  # ===========================================================================
  - id: ev_sensor_health_alert
    alias: "EV · Sensor Health Alert"
    trigger:
      - platform: state
        entity_id: binary_sensor.ev_system_sensors_healthy
        to: "off"
        for: { minutes: 5 }
    action:
      - action: notify.all_devices
        data:
          title: "⚠️ EV Sensors Problem"
          message: >
            Unavailable: {{ state_attr('binary_sensor.ev_system_sensors_healthy','unavailable_sensors') | join(', ') }}
            PV surplus charging PAUSED.

  - id: ev_sensor_health_recovered
    alias: "EV · Sensors Recovered"
    trigger:
      - platform: state
        entity_id: binary_sensor.ev_system_sensors_healthy
        to: "on"
    action:
      - action: notify.all_devices
        data:
          title: "✅ EV Sensors OK"
          message: "All sensors online. Automations operational."

  # ===========================================================================
  # I) MORNING REPORT
  # ===========================================================================
  - id: ev_morning_report
    alias: "EV · Morning Report"
    trigger:
      - platform: time
        at: "06:30:00"
    condition:
      - condition: time
        weekday: [mon, tue, wed, thu, fri]
      - condition: state
        entity_id: input_boolean.ev_system_enabled
        state: "on"
    action:
      - action: notify.all_devices
        data:
          title: "🚗 EV Morning Report"
          message: >
            Priority: {{ states('sensor.ev_today_priority_car') }}
            PV car: {{ states('sensor.ev_today_pv_car') }}

            SSN96M: {{ states('sensor.ev_ssn96m_range') }}km · {{ states('sensor.ev_ssn96m_soc') }}% · {{ states('sensor.ev_ssn96m_kwh_per_km') }}kWh/km
            EV6: {{ states('sensor.ev_ev6_range') }}km · {{ states('sensor.ev_ev6_soc') }}% · {{ states('sensor.ev_ev6_kwh_per_km') }}kWh/km

            {% if states('sensor.ev_priority_car_needs_charging') == 'True' %}
            ⚠️ Priority car still below {{ states('input_number.ev_min_weekday_range_km')|int }}km!
            {% else %}✅ Both cars above target{% endif %}

            💰 {{ states('sensor.ev_current_import_price') }} SEK/kWh
          data:
            actions:
              - action: "EV_CHARGE_NOW_1"
                title: "⚡ Outlet 1"
              - action: "EV_CHARGE_NOW_2"
                title: "⚡ Outlet 2"

  # ===========================================================================
  # J) EVENING PLAN (18:00 weekdays)
  # ===========================================================================
  - id: ev_evening_plan
    alias: "EV · Evening Charge Plan"
    trigger:
      - platform: time
        at: "18:00:00"
    condition:
      - condition: time
        weekday: [mon, tue, wed, thu, fri]
      - condition: state
        entity_id: input_boolean.ev_system_enabled
        state: "on"
    action:
      - action: notify.all_devices
        data:
          title: "🌙 Tonight's Charge Plan"
          message: >
            Priority: {{ states('sensor.ev_today_priority_car') }}
            Night charge: {{ states('sensor.ev_priority_car_kwh_needed') }}kWh · {{ states('sensor.ev_priority_car_hours_to_target') }}h
            Scheduled slots: {{ states('sensor.ev_cheapest_charge_slots') }}
            Est. cost: {{ state_attr('sensor.ev_cheapest_charge_slots','estimated_cost') }} SEK

            SSN96M: {{ states('sensor.ev_ssn96m_kwh_needed') }}kWh needed
            EV6: {{ states('sensor.ev_ev6_kwh_needed') }}kWh needed

            {% if states('sensor.ev_priority_car_kwh_needed')|float == 0
               and states('sensor.ev_ev6_kwh_needed')|float == 0 %}
            ✅ No night charging needed!
            {% endif %}
  # ===========================================================================
  # NEW: Lock the priority decision at 18:00 (or first plug-in, whichever
  # comes first). This prevents the priority from flipping mid-night when
  # the second car arrives and changes the kWh-needed balance.
  # ===========================================================================
  - id: ev_lock_priority_evening
    alias: "EV · Lock Priority at Evening"
    trigger:
      - platform: time
        at: "18:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.ev_system_enabled
        state: "on"
      - condition: time
        weekday: [mon, tue, wed, thu, fri]
    action:
      # Snapshot the current auto-decision into the manual override
      # so it won't flip when the second car arrives
      - variables:
          auto_pick: "{{ states('sensor.ev_today_priority_car') }}"
      - action: input_select.select_option
        target:
          entity_id: input_select.ev_priority_car_mode
        data:
          option: "{{ auto_pick }} Always"
      - action: notify.all_devices
        data:
          title: "🔒 Priority locked: {{ auto_pick }}"
          message: >
            Locked for tonight. Will auto-unlock at 08:00 tomorrow.

  # ===========================================================================
  # NEW: Unlock priority back to Auto in the morning
  # ===========================================================================
  - id: ev_unlock_priority_morning
    alias: "EV · Unlock Priority Morning"
    trigger:
      - platform: time
        at: "08:00:00"
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.ev_priority_car_mode
        data:
          option: "Auto (Least Night Charging)"

  # ===========================================================================
  # NEW: Re-plan when second car arrives late
  # The existing ev_car_connected already fires, but we need to also send
  # an updated plan notification showing the LOCKED priority context
  # ===========================================================================
  # (This is already handled by ev_car_connected — no change needed there,
  #  because once priority is locked, the template sensors return stable values)

  # ===========================================================================
  # NEW: Handle Nordpool tomorrow prices becoming available
  # When tomorrow_valid becomes true, re-calculate and notify if we have
  # a car in Scheduled Minimum mode
  # ===========================================================================
  - id: ev_nordpool_tomorrow_available
    alias: "EV · Nordpool Tomorrow Prices Available"
    trigger:
      - platform: template
        value_template: >
          {{ state_attr('sensor.nordpool_kwh_se4_sek_3_10_025',
                        'tomorrow') | length >= 96 }}
    condition:
      - condition: state
        entity_id: input_boolean.ev_system_enabled
        state: "on"
      - condition: template
        value_template: >
          {{ states('input_select.ev_outlet_1_charge_mode') == 'Scheduled Minimum'
             or states('input_select.ev_outlet_2_charge_mode') == 'Scheduled Minimum' }}
    action:
      # Template sensors auto-recalculate, just notify the new plan
      - delay: { seconds: 30 }  # Let templates settle
      - action: notify.all_devices
        data:
          title: "📊 Charge plan updated (tomorrow prices in)"
          message: >
            New cheapest slots: {{ states('sensor.ev_cheapest_charge_slots') }}
            Est. cost: {{ state_attr('sensor.ev_cheapest_charge_slots','estimated_cost') }} SEK

  # ===========================================================================
  # NEW: Very late arrival safety net
  # If a car connects after 22:00 and needs charging but has NO scheduled
  # slots before the deadline → start immediately
  # ===========================================================================
  - id: ev_late_arrival_safety
    alias: "EV · Late Arrival Safety Net"
    mode: parallel
    max: 2
    trigger:
      - platform: state
        entity_id: sensor.vpg1_2107009785a_1
        from: "Available"
        to: ["Charging","SuspendedEV","SuspendedEVSE"]
        id: "o1"
      - platform: state
        entity_id: sensor.vpg1_2107009785a_2
        from: "Available"
        to: ["Charging","SuspendedEV","SuspendedEVSE"]
        id: "o2"
    condition:
      - condition: state
        entity_id: input_boolean.ev_system_enabled
        state: "on"
      - condition: time
        after: "22:00:00"
      - condition: time
        weekday: [mon, tue, wed, thu, fri]
    action:
      - variables:
          outlet: "{{ 1 if trigger.id == 'o1' else 2 }}"
          car: "{{ states('input_select.ev_outlet_' ~ outlet ~ '_car') }}"
          is_pri: "{{ states('sensor.ev_today_priority_car') == car }}"
          needs: "{{ states('sensor.ev_priority_car_needs_charging') == 'True' }}"
          hrs: "{{ states('sensor.ev_priority_car_hours_to_target') | float(0) }}"
          ready_by: "{{ states('input_number.ev_weekday_ready_by_hour') | int(7) }}"
          # Hours remaining until deadline
          hours_left: >
            {% set now_h = now().hour + now().minute / 60 %}
            {% if now_h > ready_by %}
              {{ (24 - now_h) + ready_by }}
            {% else %}
              {{ ready_by - now_h }}
            {% endif %}
      - condition: template
        value_template: "{{ is_pri and needs }}"
      # If charge time needed > 80% of time remaining → start NOW
      - condition: template
        value_template: "{{ hrs > hours_left * 0.8 }}"
      - action: input_select.select_option
        target:
          entity_id: "input_select.ev_outlet_{{ outlet }}_charge_mode"
        data:
          option: "Charge Now"
      - action: notify.all_devices
        data:
          title: "🚨 Late arrival · charging NOW"
          message: >
            {{ car }} plugged in at {{ now().strftime('%H:%M') }} and needs
            {{ hrs }}h of charging. Only {{ hours_left | round(1) }}h until
            {{ ready_by }}:00 deadline. Starting full speed immediately.
